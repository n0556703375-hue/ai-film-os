<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ייבוא תסריט מלא · AI Film OS</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header><h1>ייבוא תסריט מלא</h1><p>פירוק אוטומטי לסצנות ולמספר שוטים מתאים לכל סצנה</p></header>
<main><section class="panel active">
<div class="workspace-section">
<label>הפקה</label><select id="project"></select>
<label>תסריט מלא</label><textarea id="screenplay" style="min-height:420px" placeholder="הדביקי כאן את כל התסריט..."></textarea>
<label>קצב שוטים ממוצע לדקה</label><input id="rate" type="number" min="1" max="12" step="0.5" value="5">
<label><input id="replace" type="checkbox"> החלפת כל הסצנות הקיימות בפרויקט</label>
<label><input id="generate" type="checkbox" checked> יצירת מפות שוטים ופרומפטים לכל הסצנות</label>
<div class="row"><button id="importButton" onclick="runImport()">פירוק התסריט ויצירת הסרט</button><a href="/">חזרה למערכת</a></div>
<div id="status" class="card" style="margin-top:18px;display:none"></div>
</div></section></main>
<script src="/static/safe_api.js"></script>
<script>
const $=id=>document.getElementById(id);
function escapeHtml(value){return String(value??'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
async function json(url,options={}){
  let response;
  try{
    response=await fetch(url,{headers:{'Content-Type':'application/json'},...options});
  }catch(_error){
    throw new FilmOsApiError('לא ניתן להגיע לשרת. בדקי את החיבור ונסי שוב.',{
      code:'network_error',
      retryable:true
    });
  }
  return parseApiResponse(response);
}
async function init(){
  const projects=await json('/api/projects');
  $('project').innerHTML=projects.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
  const saved=Number(localStorage.getItem('filmOsProjectId'));
  if(saved)$('project').value=String(saved);
}
function setProgress(title,message){
  $('status').innerHTML=`<h3>${escapeHtml(title)}</h3><p>${escapeHtml(message)}</p>`;
}
async function runImport(){
  if($('screenplay').value.trim().length<50)return alert('יש להדביק תסריט מלא.');
  if($('replace').checked&&!confirm('כל הסצנות והשוטים הקיימים בפרויקט יוחלפו. להמשיך?'))return;
  const button=$('importButton');
  button.disabled=true;
  $('status').style.display='block';
  try{
    setProgress('שלב 1 מתוך 2','OpenAI מפרק את התסריט לסצנות. אין לסגור את החלון.');
    const shouldGenerate=$('generate').checked;
    const data=await json('/api/scenes/import-script',{
      method:'POST',
      body:JSON.stringify({
        project_id:Number($('project').value),
        screenplay:$('screenplay').value,
        replace_existing:$('replace').checked,
        generate_shot_maps:false,
        target_shots_per_minute:Number($('rate').value)
      })
    });
    let shotsCreated=0;
    const scenes=data.imported_scenes||[];
    if(shouldGenerate){
      for(let index=0;index<scenes.length;index++){
        const scene=scenes[index];
        const count=Number(scene.recommended_shot_count||6);
        setProgress('שלב 2 מתוך 2',`יוצרת מפת שוטים לסצנה ${index+1} מתוך ${scenes.length} · ${count} שוטים`);
        const createdScene=await json(`/api/scenes/${scene.id}/shot-map`,{
          method:'POST',
          body:JSON.stringify({shot_count:count,replace_existing:false})
        });
        shotsCreated+=(createdScene.shots||[]).length;
      }
    }
    $('status').innerHTML=`<h3>הייבוא הושלם</h3><p><b>${data.scenes_created}</b> סצנות נוצרו.</p><p><b>${shotsCreated}</b> שוטים נוצרו.</p><a href="/">פתיחת AI Film OS</a>`;
  }catch(error){
    const retryMessage=error&&error.retryable?' ניתן לנסות שוב את השלב שנכשל.':'';
    $('status').innerHTML=`<h3>הייבוא נכשל</h3><p>${escapeHtml(error.message)}</p><p>הסצנות שכבר נוצרו נשמרו.${retryMessage}</p>`;
  }finally{
    button.disabled=false;
  }
}
init().catch(error=>alert(error.message));
</script>
</body></html>
