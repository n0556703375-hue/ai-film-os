<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Film OS</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header>
  <h1>AI Film OS</h1>
  <p>Story Bible · Scenes · Shots · Continuity · QA</p>
  <div class="project-switcher">
    <label for="projectSelect">הפקה פעילה</label>
    <select id="projectSelect" onchange="switchProject(this.value)"></select>
    <button class="secondary" onclick="newProject()">הפקה חדשה</button>
    <a class="button" href="/script-import">ייבוא תסריט מלא</a>
  </div>
  <div id="projectProgressSummary" class="meta" aria-live="polite"></div>
</header>
<main>
  <nav>
    <button data-tab="dashboard">דשבורד</button>
    <button data-tab="scenes">סצנות</button>
    <button data-tab="shots">שוטים</button>
    <button data-tab="assets">Story Bible</button>
    <button data-tab="qa">QA Center</button>
  </nav>
  <section id="dashboard" class="panel active"></section>
  <section id="scenes" class="panel"></section>
  <section id="shots" class="panel"></section>
  <section id="assets" class="panel"></section>
  <section id="qa" class="panel"></section>
</main>
<div id="modal" class="modal"><div class="dialog"><button onclick="closeModal()">סגירה</button><div id="modalContent"></div></div></div>
<script src="/static/project-progress.js"></script>
<script src="/static/app.js"></script>
<script src="/static/project-progress-ui.js"></script>
<script src="/static/character-lock.js"></script>
<script src="/static/shot-approval.js"></script>
<script src="/static/job-queue-ui.js"></script>
<script src="/static/continuity-ui.js"></script>
<script src="/static/scene-assembly-ui.js"></script>
<script src="/static/cost-tracking-ui.js"></script>
<script src="/static/shot-filters-ui.js"></script>
</body>
</html>
