name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: film_os_validation
          POSTGRES_USER: film_os_ci
          POSTGRES_PASSWORD: film_os_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U film_os_ci -d film_os_validation"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile application
        run: python -m compileall -q app
      - name: Validate PostgreSQL schema rollback path
        env:
          POSTGRES_SCHEMA_VALIDATION_URL: postgresql://film_os_ci:film_os_ci_password@localhost:5432/film_os_validation
        run: python -m app.database.validate_postgres_schema --confirm-rollback-only
      - name: Validate complete cutover readiness rollback path
        env:
          FILM_OS_DB: ci-film-os-source.db
          FILM_OS_BACKUP_DB: ci-film-os-backup.db
          POSTGRES_IMPORT_VALIDATION_URL: postgresql://film_os_ci:film_os_ci_password@localhost:5432/film_os_validation
        shell: bash
        run: |
          set -euo pipefail
          trap 'rm -f "$FILM_OS_DB" "$FILM_OS_BACKUP_DB"' EXIT
          python - <<'PY'
          import os
          import sqlite3
          from pathlib import Path

          from app.database.schema import SCHEMA_SQL

          source_path = Path(os.environ["FILM_OS_DB"])
          backup_path = Path(os.environ["FILM_OS_BACKUP_DB"])

          with sqlite3.connect(source_path) as source:
              source.executescript(SCHEMA_SQL)
              source.commit()
              with sqlite3.connect(backup_path) as backup:
                  source.backup(backup)
          PY
          python -m app.database.cutover_readiness --confirm-non-destructive
      - name: Run tests
        id: tests
        shell: bash
        continue-on-error: true
        run: |
          python -m unittest discover -s tests -v > test-output.log 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log
          if-no-files-found: error
      - name: Fail when tests fail
        if: steps.tests.outputs.exit_code != '0'
        run: |
          tail -n 100 test-output.log
          exit 1
      - name: Print passing test output
        if: steps.tests.outputs.exit_code == '0'
        run: cat test-output.log
