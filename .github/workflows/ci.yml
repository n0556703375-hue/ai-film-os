name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile application
        run: python -m compileall -q app
      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          if ! python -m unittest discover -s tests -v > test-output.log 2>&1; then
            echo "::group::Failing test output"
            tail -n 100 test-output.log
            echo "::endgroup::"
            exit 1
          fi
          cat test-output.log
