name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: film_os_validation
          POSTGRES_USER: film_os_ci
          POSTGRES_PASSWORD: film_os_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U film_os_ci -d film_os_validation"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile application
        run: python -m compileall -q app
      - name: Validate PostgreSQL schema rollback path
        env:
          POSTGRES_SCHEMA_VALIDATION_URL: postgresql://film_os_ci:film_os_ci_password@localhost:5432/film_os_validation
        run: python -m app.database.validate_postgres_schema --confirm-rollback-only
      - name: Validate complete cutover readiness rollback path
        env:
          FILM_OS_DB: ci-film-os-source.db
          FILM_OS_BACKUP_DB: ci-film-os-backup.db
          POSTGRES_IMPORT_VALIDATION_URL: postgresql://film_os_ci:film_os_ci_password@localhost:5432/film_os_validation
        shell: bash
        run: |
          set -euo pipefail
          trap 'rm -f "$FILM_OS_DB" "$FILM_OS_BACKUP_DB"' EXIT
          python - <<'PY'
          import os
          import sqlite3
          from pathlib import Path

          from app.database.schema import SCHEMA_SQL

          source_path = Path(os.environ["FILM_OS_DB"])
          backup_path = Path(os.environ["FILM_OS_BACKUP_DB"])

          with sqlite3.connect(source_path) as source:
              source.executescript(SCHEMA_SQL)
              source.commit()
              with sqlite3.connect(backup_path) as backup:
                  source.backup(backup)
          PY
          python -m app.database.cutover_readiness --confirm-non-destructive
      - name: Validate persistent PostgreSQL import commit path
        env:
          FILM_OS_DB: ci-film-os-import-source.db
          FILM_OS_BACKUP_DB: ci-film-os-import-backup.db
          POSTGRES_IMPORT_URL: postgresql://film_os_ci:film_os_ci_password@localhost:5432/film_os_validation
        shell: bash
        run: |
          set -euo pipefail
          trap 'rm -f "$FILM_OS_DB" "$FILM_OS_BACKUP_DB"' EXIT
          python - <<'PY'
          import os
          import sqlite3
          from pathlib import Path

          from app.database.schema import SCHEMA_SQL

          source_path = Path(os.environ["FILM_OS_DB"])
          backup_path = Path(os.environ["FILM_OS_BACKUP_DB"])

          with sqlite3.connect(source_path) as source:
              source.execute("PRAGMA foreign_keys = ON")
              source.executescript(SCHEMA_SQL)
              source.execute(
                  "INSERT INTO projects (id, name, description, visual_style, rules) "
                  "VALUES (?, ?, ?, ?, ?)",
                  (101, "CI Film", "non-empty migration fixture", "cold cinematic", "women-only cast"),
              )
              source.execute(
                  "INSERT INTO scenes (id, project_id, scene_number, title, story_goal) "
                  "VALUES (?, ?, ?, ?, ?)",
                  (201, 101, 1, "Opening", "establish the production world"),
              )
              source.execute(
                  "INSERT INTO shots (id, project_id, scene_id, shot_number, title, prompt) "
                  "VALUES (?, ?, ?, ?, ?, ?)",
                  (301, 101, 201, 1, "Establishing shot", "wide cinematic production office"),
              )
              source.execute(
                  "INSERT INTO assets (id, project_id, asset_type, name, lock_status, version) "
                  "VALUES (?, ?, ?, ?, ?, ?)",
                  (401, 101, "location", "Production Office", "locked", 2),
              )
              source.execute(
                  "INSERT INTO shot_assets (shot_id, asset_id) VALUES (?, ?)",
                  (301, 401),
              )
              source.execute(
                  "INSERT INTO prompt_versions (id, shot_id, version, prompt) VALUES (?, ?, ?, ?)",
                  (501, 301, 1, "wide cinematic production office"),
              )
              source.execute(
                  "INSERT INTO media_results "
                  "(id, shot_id, media_type, version, url, provider, model, prompt_version_id, status) "
                  "VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)",
                  (601, 301, "image", 1, "https://example.invalid/ci-image.png", "CI", "fixture", 501, "approved"),
              )
              source.execute(
                  "INSERT INTO approval_events "
                  "(id, shot_id, media_result_id, event_type, from_status, to_status) "
                  "VALUES (?, ?, ?, ?, ?, ?)",
                  (701, 301, 601, "approve_image", "draft", "approved"),
              )
              source.commit()
              with sqlite3.connect(backup_path) as backup:
                  source.backup(backup)
          PY
          python -m app.database.postgres_import_commit \
            --confirm-persistent-import IMPORT_TO_EMPTY_POSTGRES
          python - <<'PY'
          import os
          import psycopg

          from app.database.postgres_import_dry_run import TABLE_ORDER

          expected_counts = {
              "projects": 1,
              "scenes": 1,
              "shots": 1,
              "assets": 1,
              "shot_assets": 1,
              "asset_reference_images": 0,
              "continuity_issues": 0,
              "prompt_versions": 1,
              "media_results": 1,
              "approval_events": 1,
              "media_jobs": 0,
          }

          with psycopg.connect(os.environ["POSTGRES_IMPORT_URL"]) as connection:
              with connection.cursor() as cursor:
                  cursor.execute(
                      "SELECT tablename FROM pg_catalog.pg_tables "
                      "WHERE schemaname = current_schema()"
                  )
                  actual_tables = {row[0] for row in cursor.fetchall()}
                  expected_tables = set(TABLE_ORDER)
                  if actual_tables != expected_tables:
                      raise SystemExit("Persistent import did not commit the expected schema contract.")

                  for table, expected_count in expected_counts.items():
                      cursor.execute(f'SELECT COUNT(*) FROM "{table}"')
                      if cursor.fetchone()[0] != expected_count:
                          raise SystemExit("Persistent import row counts do not match the fixture contract.")

                  cursor.execute(
                      "SELECT p.name, s.title, sh.title, a.name, pv.prompt, mr.status, ae.to_status "
                      "FROM projects p "
                      "JOIN scenes s ON s.project_id = p.id "
                      "JOIN shots sh ON sh.scene_id = s.id AND sh.project_id = p.id "
                      "JOIN shot_assets sa ON sa.shot_id = sh.id "
                      "JOIN assets a ON a.id = sa.asset_id AND a.project_id = p.id "
                      "JOIN prompt_versions pv ON pv.shot_id = sh.id "
                      "JOIN media_results mr ON mr.shot_id = sh.id AND mr.prompt_version_id = pv.id "
                      "JOIN approval_events ae ON ae.shot_id = sh.id AND ae.media_result_id = mr.id"
                  )
                  row = cursor.fetchone()
                  expected = (
                      "CI Film",
                      "Opening",
                      "Establishing shot",
                      "Production Office",
                      "wide cinematic production office",
                      "approved",
                      "approved",
                  )
                  if row != expected:
                      raise SystemExit("Persistent import did not preserve fixture values and relationships.")
          PY
      - name: Run tests
        id: tests
        shell: bash
        continue-on-error: true
        run: |
          python -m unittest discover -s tests -v > test-output.log 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log
          if-no-files-found: error
      - name: Fail when tests fail
        if: steps.tests.outputs.exit_code != '0'
        run: |
          tail -n 100 test-output.log
          exit 1
      - name: Print passing test output
        if: steps.tests.outputs.exit_code == '0'
        run: cat test-output.log
